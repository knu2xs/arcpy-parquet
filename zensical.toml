[project]
site_name = "ArcPy Parquet 0.3.0"
docs_dir = "docsrc/mkdocs"
site_dir = "docs"
repo_url = "https://github.com/knu2xs/arcpy-parquet/"
repo_name = "knu2xs/arcpy-parquet"

nav = [
  { Home = "index.md" },
  { "ArcGIS Pro Toolbox" = "toolbox.md" },
  { "Python API" = "api.md" }
]

[project.theme]
variant = "classic"

[project.theme.icon]
logo = "fontawesome/solid/globe-americas"

# Default dark palette, matching the previous feel more closely
[[project.theme.palette]]
scheme = "slate"
primary = "blue"
accent = "green"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# Light palette
[[project.theme.palette]]
scheme = "default"
primary = "blue"
accent = "green"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[project.plugins.mkdocstrings]
enable_inventory = true
default_handler = "python"

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]
inventories = [
  "https://docs.python.org/3/objects.inv",
  "https://pandas.pydata.org/docs/objects.inv",
  "https://scikit-learn.org/stable/objects.inv"
]

[project.plugins.mkdocstrings.handlers.python.options]
show_root_heading = true
show_root_toc_entry = false
heading_level = 2
show_symbol_type_heading = false
show_signature = true
show_signature_annotations = true
separate_signature = false
docstring_style = "google"
show_source = true
